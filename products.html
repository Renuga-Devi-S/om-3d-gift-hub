<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Products | OM 3D Gift Hub</title>

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/products.css">
    <link rel="stylesheet" href="css/responsive.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

</head>

<body>

    <!-- Navbar -->
    <div id="navbar"></div>



    <section class="product-banner">

        <h1>Our 
            <span> Products </span></h1>

        <p>
            Explore our premium customized 3D printed gifts.
        </p>

    </section>

    <!-- Search -->

    <section class="product-controls">

        <input type="text" id="search" placeholder="Search products...">

    </section>

    <!-- Categories -->

    <section class="categories">

        <button class="filter active" data-category="all">All</button>

        <button class="filter" data-category="keychain">Keychains</button>

        <button class="filter" data-category="idol">Idols</button>

        <button class="filter" data-category="frame">Frames</button>

        <button class="filter" data-category="Statue">Statue</button>
        <button class="filter" data-category="Lamps">Personalized Lamps</button>

        <button class="filter" data-category="Others">Others</button>

    </section>

    <!-- Products -->

    <section class="products-grid" id="productsGrid">

    </section>

    <script src="js/data.js"></script>

    <script src="js/products.js"></script>
 <script src="js/include.js"></script>
</body>

</html>
